version: '3.8'

services:
  # Override API service for development
  api:
    build:
      context: .
      target: builder
    volumes:
      - ./src:/app/src
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    command: npm run dev
    ports:
      - "3000:3000"

  # Disable monitoring services in dev for simplicity
  prometheus:
    profiles:
      - monitoring

  grafana:
    profiles:
      - monitoring
